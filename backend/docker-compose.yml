version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: carcollector_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: carcollector_db
      MYSQL_USER: carcollector_user
      MYSQL_PASSWORD: carcollector_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  mysql_data:
